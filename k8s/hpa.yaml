apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: now-and-always-hpa
  namespace: now-and-always
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: now-and-always-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
