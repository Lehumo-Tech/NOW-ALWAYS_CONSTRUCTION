apiVersion: v1
kind: Namespace
metadata:
  name: now-and-always
  labels:
    app: now-and-always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: now-and-always-web
  namespace: now-and-always
  labels:
    app: now-and-always
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: now-and-always
      component: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: now-and-always
        component: web
    spec:
      containers:
        - name: web
          image: now-and-always/web:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
